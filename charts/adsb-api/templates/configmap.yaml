apiVersion: v1
kind: ConfigMap
metadata:
  name: adsb-api-config
  labels:
    app: adsb-api
    component: config
data:
  config.json: |
    {
      "endpoints": {
        "mil-central-europe": {
          "tables": ["aircraft_military", "positions_military"],
          "url": "https://api.airplanes.live/v2/mil",
          "filter": "czechia",
          "stale_timeout": "2"
        },
        "mil-baltic": {
          "tables": ["aircraft_military", "positions_military"],
          "url": "https://api.airplanes.live/v2/mil",
          "filter": "baltic",
          "stale_timeout": "2"
        },
        "vip-mil-icaos": {
          "tables": ["aircraft_military", "positions_military"],
          "url": "https://api.airplanes.live/v2/mil",
          "filter": "vip_icaos",
          "stale_timeout": "2"
        }
      },
      "filters": {
        "baltic": {
          "kind": "poi",
          "coordinates": {
            "lon": "18.512082",
            "lat": "57.470279",
            "distance": "500",
            "unit": "km"
          }
        },
        "czechia": {
          "kind": "poi",
          "coordinates": {
            "lon": "16.606836",
            "lat": "49.195061",
            "distance": "500",
            "unit": "km"
          }
        },
        "vip_icaos": {
          "kind": "icao",
          "icao_list": [
            "4aecd2",
            "8960b1"
          ]
        }
      }
    }
