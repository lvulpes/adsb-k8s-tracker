apiVersion: apps/v1
kind: Deployment
metadata:
  name: adsb-decoder-deployment
  labels:
    app.kubernetes.io/name: adsb-decoder
    app.kubernetes.io/component: decoder
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: adsb-decoder
  template:
    metadata:
      labels:
        app.kubernetes.io/name: adsb-decoder
    spec:
      containers:
        - name: adsb-decoder
          image: ghcr.io/sdr-enthusiasts/docker-adsb-ultrafeeder:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: "Europe/Stockholm"
            - name: LAT
              valueFrom:
                secretKeyRef:
                  name: adsb-location-secret
                  key: location_lat
            - name: LONG
              valueFrom:
                secretKeyRef:
                  name: adsb-location-secret
                  key: location_lon
            - name: ALT
              valueFrom:
                secretKeyRef:
                  name: adsb-location-secret
                  key: location_alt
          securityContext:
            privileged: true
          volumeMounts:
          - name: usb-bus
            mountPath: /dev/bus/usb
          # Resource limits 
          resources:
            limits:
              cpu: 1500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
      volumes:
      - name: usb-bus
        hostPath:
          path: /dev/bus/usb
---
apiVersion: v1
kind: Service
metadata:
  name: adsb-decoder-service
spec:
  selector:
    app.kubernetes.io/name: adsb-decoder
  clusterIP: None
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

