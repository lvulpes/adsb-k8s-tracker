apiVersion: apps/v1
kind: Deployment
metadata:
  name: adsb-ui-deployment
  labels:
    app.kubernetes.io/name: adsb-ui
    app.kubernetes.io/component: ui
spec:
  replicas: 1 
  selector:
    matchLabels:
      app.kubernetes.io/name: adsb-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: adsb-ui
    spec:
      containers:
        - name: adsb-ui
          image: adsb-ui:local
          imagePullPolicy: IfNotPresent
          command: ["python"]
          args: ["adsb-ui/main.py"]
          env:
            - name: DB_DSN
              valueFrom: 
                secretKeyRef:
                  name: adsb-db-credentials
                  key: database_dsn
            - name: LISTEN_PORT
              value: "8000"
            - name: LOG_LEVEL
              value: DEBUG
            - name: STATIC_HTML_DIR
              value: "/app/adsb-ui/static"
          # Resource limits 
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: adsb-ui-service
spec:
  selector:
    app.kubernetes.io/name: adsb-ui
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP

