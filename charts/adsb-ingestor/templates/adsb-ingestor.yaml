apiVersion: apps/v1
kind: Deployment
metadata:
  name: adsb-ingestor-deployment
  labels:
    app.kubernetes.io/name: adsb-ingestor
    app.kubernetes.io/component: ingestor
spec:
  replicas: 1 
  selector:
    matchLabels:
      app.kubernetes.io/name: adsb-ingestor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: adsb-ingestor
    spec:
      containers:
        - name: adsb-ingestor
          image: adsb-ingestor:local
          imagePullPolicy: IfNotPresent
          command: ["python"]
          args: ["adsb-ingestor/main.py"]
          env:
            - name: DECODER_URL
              value: "http://adsb-decoder-service:8080/data/aircraft.json"
            - name: DECODER_PORT
              value: "30003"
            - name: DB_DSN
              valueFrom: 
                secretKeyRef:
                  name: adsb-db-credentials
                  key: database_dsn
            - name: LISTEN_PORT
              value: "8000"
            - name: POLL_INTERVAL
              value: "15"
            - name: LOG_LEVEL
              value: DEBUG
          # Resource limits 
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: adsb-ingestor-service
spec:
  selector:
    app.kubernetes.io/name: adsb-ingestor
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP

